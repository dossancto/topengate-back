name: .NET PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: dotnet format (excluding Migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Run dotnet format
        run: dotnet format --exclude ./src/Opengate/Migrations --verify-no-changes

  test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Run tests
        run: dotnet test ./tests/Opengate.Tests.Unit
